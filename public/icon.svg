<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Rune &amp; Blade Icon</title>
  <desc id="desc">A glowing rune blade over a dark fantasy crest.</desc>
  <defs>
